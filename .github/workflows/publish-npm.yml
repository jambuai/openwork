# Publishes to npm using the "name" and "version" fields in package.json (this repo: github.com/jambuai/openwork)
# when you publish a GitHub Release, or manually via workflow_dispatch on main.
#
# Setup (once):
# 1. Create an npm "Automation" token: https://www.npmjs.com/settings/~/tokens
# 2. Repo → Settings → Secrets → Actions → New repository secret: NPM_TOKEN
#
# Release flow:
# 1. Bump "version" in package.json on main and push (or merge PR).
# 2. Git tag matching that version, e.g. git tag v0.2.0 && git push origin v0.2.0
# 3. GitHub → Releases → Draft a release from that tag → Publish release.
#    (workflow_dispatch can be used for dry runs on a branch if needed.)

name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
